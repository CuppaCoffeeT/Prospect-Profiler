// ── STATE ──
var scr=0; // current screen: 0=home, 1=Q1-4, 2=Q5-8, 3-7=NV groups, 8=result
var ans=new Array(8).fill(null);
var ckNV={};
var info={};
var notes="";
var pf=null;
var TOTAL=2+NVG.length; // 2 Q screens + 5 NV screens = 7

// ── TOAST ──
function toast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("on");
  setTimeout(function(){t.classList.remove("on");},2500);
}

// ── NOTES ──
function openNotes(){document.getElementById("nta").value=notes;document.getElementById("mbg").classList.add("on");}
function saveNotes(){notes=document.getElementById("nta").value;document.getElementById("mbg").classList.remove("on");toast("Notes saved");}

// ── NAVIGATION ──
function go(n){
  scr=n;
  window.scrollTo(0,0);
  var app=document.getElementById("app");
  var bot=document.getElementById("bot");
  var prg=document.getElementById("prg");
  var sub=document.getElementById("hSub");

  if(n===0){
    prg.style.display="none";
    sub.textContent="DISC x MBTI Auto-Profile";
    app.innerHTML=homeHTML();
    bot.innerHTML='<button class="bnx" style="width:100%" onclick="startForm()">Start Profiling &#8594;</button>';
  } else if(n===1||n===2){
    prg.style.display="block";
    updatePrg(n);
    sub.textContent="Profiling "+(info.name||"prospect");
    var batch=n===1?[0,1,2,3]:[4,5,6,7];
    app.innerHTML=qHTML(batch,n);
    var allDone=batch.every(function(i){return ans[i]!==null;});
    bot.innerHTML='<button class="bbk" onclick="goBack()">&#8592; Back</button><button class="bnx" id="btnNext" onclick="goNext()" '+(allDone?"":"disabled")+'>Next &#8594;</button>';
  } else if(n>=3&&n<=TOTAL){
    prg.style.display="block";
    updatePrg(n);
    sub.textContent="Profiling "+(info.name||"prospect");
    var gi=n-3;
    app.innerHTML=nvHTML(gi);
    var isLast=(n===TOTAL);
    bot.innerHTML='<button class="bbk" onclick="goBack()">&#8592; Back</button><button class="bnx" onclick="goNext()">'+(isLast?"Generate Profile &#8594;":"Next &#8594;")+'</button>';
  } else if(n==="R"){
    prg.style.display="none";
    sub.textContent=(info.name||"Prospect")+" &middot; Profile Ready";
    app.innerHTML=resultHTML();
    bot.innerHTML="";
  }
}

function updatePrg(n){
  var pc=Math.round(n/TOTAL*100);
  document.getElementById("pFill").style.width=pc+"%";
  document.getElementById("sLbl").textContent="Step "+n+" of "+TOTAL;
  document.getElementById("pcLbl").textContent=pc+"%";
}

function startForm(){
  info={
    adv:document.getElementById("iAdv").value.trim()||"Advisor",
    name:document.getElementById("iNm").value.trim()||"Prospect",
    age:document.getElementById("iAg").value,
    meeting:document.getElementById("iMt").value,
    occ:document.getElementById("iOc").value.trim()
  };
  go(1);
}

function goNext(){
  if(scr===TOTAL){pf=calcPf();go("R");}
  else{go(scr+1);}
}

function goBack(){
  if(scr==="R"||scr<=1){go(0);}
  else{go(scr-1);}
}

    +'<p style="font-size:13px;color:var(--mu);font-family:sans-serif;line-height:1.6">8 questions + body language = instant DISC &amp; MBTI profile</p>'
    +'</div>'
    +'<div class="card">'

function escH(s){return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");}

// ── QUESTION HTML ──
function qHTML(batch,pn){
  var h='<span class="ey">Questions '+(pn===1?'1-4':'5-8')+'</span>'
    +'<h2 style="font-size:19px;font-weight:normal;margin-bottom:4px">Profiling '+escH(info.name||'prospect')+'</h2>'
    +'<p style="font-size:13px;color:var(--mu);font-family:sans-serif;line-height:1.6;margin-bottom:16px">Weave into conversation. Pick the best match.</p>';
  batch.forEach(function(qi){
    var q=QS[qi];
    var pc=q.ph==="open"?"po":"pd";
    var pl=q.ph==="open"?"Opening":"Discovery";
    h+='<div style="margin-bottom:22px">'
      +'<span class="ptag '+pc+'">'+pl+'</span>'
      +'<p class="qtip">&#128161; '+q.tip+'</p>'
      +'<div class="qask">'+q.ask+'</div>';
    q.opts.forEach(function(o,oi){
      var sel=ans[qi]&&ans[qi].oi===oi;
      h+='<div class="opt'+(sel?' s'+o.d:'')+'" data-qi="'+qi+'" data-oi="'+oi+'" data-d="'+o.d+'" onclick="selO(this)">'
        +'<div class="rc"><div class="rd"></div></div>'
        +'<span class="otx">'+o.t+'</span>'
        +'<span class="dbg">DISC-'+o.d+'</span>'
        +'</div>';
    });
    h+='</div>';
  });
  return h;
}

function selO(el){
  var qi=+el.dataset.qi, oi=+el.dataset.oi, dc=el.dataset.d;
  ans[qi]={oi:oi,d:dc,mb:QS[qi].opts[oi].mb};
  var batch=qi<4?[0,1,2,3]:[4,5,6,7];
  var pn=qi<4?1:2;
  document.getElementById("app").innerHTML=qHTML(batch,pn);
  var allDone=batch.every(function(i){return ans[i]!==null;});
  var btn=document.getElementById("btnNext");
  if(btn)btn.disabled=!allDone;
}

// ── NV HTML ──
function nvHTML(gi){
  var g=NVG[gi];
  var cnt=g.items.filter(function(it){return ckNV[it.id];}).length;
  var h='<div style="display:flex;align-items:center;gap:10px;margin-bottom:11px">'
    +'<span style="font-size:22px">'+g.em+'</span>'
    +'<div><div style="font-size:16px">'+g.tt+'</div>'
    +'<div style="font-size:11px;color:var(--mu);font-family:sans-serif;margin-top:1px">'+g.st+'</div></div></div>'
    +'<p style="font-size:13px;color:var(--mu);font-family:sans-serif;line-height:1.5;margin-bottom:11px">Tick everything you observed.</p>'
    +'<div style="font-size:11px;color:var(--gold);font-family:sans-serif;margin-bottom:10px">'
    +(cnt===0?"Nothing ticked yet":cnt+" signal"+(cnt!==1?"s":"")+" ticked")+'</div>';
  g.items.forEach(function(it){
    var ticked=!!ckNV[it.id];
    h+='<div class="nvi'+(ticked?' ck'+it.d:'')+'" data-id="'+it.id+'" data-d="'+it.d+'" data-gi="'+gi+'" onclick="tgNV(this)">'
      +'<div class="cb">'+(ticked?'&#10003;':'')+'</div>'
      +'<span style="font-size:13px;color:'+(ticked?'var(--tx)':'var(--mu)')+';font-family:sans-serif;line-height:1.5;flex:1">'+it.t+'</span>'
      +(ticked?'<span class="dbg" style="display:block">DISC-'+it.d+'</span>':'')
      +'</div>';
  });
  return h;
}

function tgNV(el){
  var id=el.dataset.id, gi=+el.dataset.gi;
  ckNV[id]=!ckNV[id];
  document.getElementById("app").innerHTML=nvHTML(gi);
}

// ── SCORING ──
function occNudge(dc,mb,occ){
  if(!occ)return;
  var o=occ.toLowerCase();
  if(/engineer|software|developer|it |data|analyst|analytic|auditor|accountant|accounting|scientist|research|actuari|statistic|architect|cybersec|network|database|quality|tester/.test(o)){dc.C+=2;mb.T++;mb.I++;}
  if(/sales|business dev|entrepreneur|director|ceo|md |founder|gm |general manager|managing|vp |vice president|head of|chief|partner/.test(o)){dc.D+=2;mb.E++;mb.T++;}
  if(/market|creative|design|artist|pr |public rel|events|media|influenc|content|performer|music|fashion|photog|social media|community/.test(o)){dc.I+=2;mb.E++;mb.N++;}
  if(/teacher|educat|lecturer|professor|nurse|nursing|social work|counsell|therapist|psycholog|hr |human res|admin|customer serv|support|care|caregiv|welfare|nonprofit|volunteer/.test(o)){dc.S+=2;mb.F++;mb.I++;}
  if(/lawyer|attorney|legal|solicitor|finance|banker|banking|investment|fund|consultant|advisor|adviser|manager|project|operations|compliance|risk/.test(o)){dc.D++;dc.C++;mb.T++;}
  if(/self.employ|freelanc|own business|business owner|sole prop|proprietor/.test(o)){dc.D++;dc.I++;mb.E++;}
  if(/doctor|physician|surgeon|specialist|pharmacist|dentist|optom|medical|clinic|hospital/.test(o)){dc.C++;dc.D++;mb.T++;}
}

function calcPf(){
  var dc={D:0,I:0,S:0,C:0},mb={E:0,I:0,T:0,F:0,J:0,P:0,S:0,N:0};
  occNudge(dc,mb,info.occ||"");
  ans.forEach(function(a){if(!a)return;dc[a.d]=(dc[a.d]||0)+2;mb[a.mb.v]=(mb[a.mb.v]||0)+1;});
  NVG.forEach(function(g){g.items.forEach(function(it){if(ckNV[it.id])dc[it.d]=(dc[it.d]||0)+1;});});
  var s=Object.entries(dc).sort(function(a,b){return b[1]-a[1];});
  return{dc:dc,mb:mb,pri:s[0][0],sec:s[1][0],
    mbs:(mb.E>=mb.I?"E":"I")+(mb.S>=mb.N?"S":"N")+(mb.T>=mb.F?"T":"F")+(mb.J>=mb.P?"J":"P"),
    nvCount:Object.values(ckNV).filter(Boolean).length,
    qCount:ans.filter(Boolean).length,
    occUsed:info.occ||""};
}

// ── RESULT HTML ──
function resultHTML(){
  var p=PR[pf.pri],s=PR[pf.sec];

    +'<span style="padding:4px 12px;border-radius:20px;font-family:sans-serif;font-size:11px;font-weight:700;background:rgba(0,0,0,.22);color:rgba(255,255,255,.8)">Secondary: '+pf.sec+' &middot; '+s.nm+'</span>'
    +'<span style="padding:4px 12px;border-radius:20px;font-family:sans-serif;font-size:11px;font-weight:700;background:rgba(0,0,0,.22);color:rgba(255,255,255,.8)">MBTI: '+pf.mbs+' &middot; '+p.mb+'</span>'

    +'<div style="font-size:13px;color:#E8E0D0;font-family:sans-serif;line-height:1.7;font-style:italic">&ldquo;'+p.sg+'&rdquo;</div>'

  // Action buttons
  h+='<div class="abg">'
    +'<button class="abtn ab-pdf" onclick="dlPDF()"><span class="ai">&#128196;</span><span>Download PDF</span><span style="font-size:10px;opacity:.8;font-weight:400">via print</span></button>'
    +'<button class="abtn ab-csv" onclick="dlCSV()"><span class="ai">&#128202;</span><span>Save CSV</span><span style="font-size:10px;opacity:.8;font-weight:400">open in Excel</span></button>'

  // DISC scores
  h+='<div class="card">';
  if(pf.occUsed){
    h+='<span style="display:inline-block;padding:2px 10px;border-radius:20px;font-size:10px;font-family:sans-serif;font-weight:600;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);color:#C9A84C;margin-bottom:10px">&#128084; Occupation factored in: '+escH(pf.occUsed)+'</span>';

      +'<div class="str"><div class="sfill" style="width:'+(mx>0?Math.round((pf.dc[d]||0)/mx*100):0)+'%;background:'+PR[d].col+'"></div></div></div>';

  h+='<div style="border-top:1px solid rgba(255,255,255,.08);margin-top:13px;padding-top:13px"><span class="ey">MBTI Result</span>';

    var barPc=tot>0?Math.round(winScore/tot*100):50;
    h+='<div style="background:rgba(255,255,255,.04);border-radius:10px;padding:11px 13px;margin-bottom:9px;border:1px solid rgba(255,255,255,.07)">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
      +'<span style="font-size:12px;font-weight:700;font-family:sans-serif;color:#C9A84C">'+(tot===0?"No signals yet":winLbl+" &rarr; "+winScore+" signal"+(winScore!==1?"s":""))+'</span>'

      +'</div>'

// ── ACTIONS ──
function cpStmt(el){
  var txt=el.querySelector(".stmt-txt").textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(function(){
      el.style.background="rgba(201,168,76,.15)";
      setTimeout(function(){el.style.background="";},700);
      toast("Copied!");
    });
  } else {
    var ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    toast("Copied!");
  }
}

function dlPDF(){
  var np=document.getElementById("notePrint");
  if(np)np.textContent=notes||"No notes added.";
  setTimeout(function(){window.print();},80);
}

function dlCSV(){
  if(!pf){toast("No profile yet");return;}
  var dt=new Date().toISOString().slice(0,10);
  var hdr="Date,Advisor,Prospect,Age,Occupation,Meeting,DISC Primary,DISC Secondary,MBTI,Score D,Score I,Score S,Score C,Questions,Observations,Notes";
  var row=[dt,info.adv,info.name,info.age,info.occ,info.meeting,pf.pri,pf.sec,pf.mbs,
    pf.dc.D||0,pf.dc.I||0,pf.dc.S||0,pf.dc.C||0,pf.qCount,pf.nvCount,
    '"'+notes.replace(/"/g,'""')+'"'].join(",");
  var blob=new Blob([hdr+"\n"+row],{type:"text/csv"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="profile_"+info.name.replace(/\s+/g,"_")+"_"+dt+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast("CSV saved");
}

function resetAll(){
  ans=new Array(8).fill(null);
  ckNV={};info={};notes="";pf=null;
  go(0);
}

// ── INIT ──
go(0);
</script>
